  # ─────────────────────────────────────────────────────────────────────────
  # 2. Run DB migrations before deploying new code
  # ─────────────────────────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Run Alembic migrations via ECS run-task
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition etl-agent-api \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Grab private subnet and security group from SSM or hardcode via secrets
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_IDS }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP_ID }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["alembic","-c","src/etl_agent/database/migrations/alembic.ini","upgrade","head"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: ${TASK_ARN}"

          # Wait for the migration task to finish (max 5 min)
          aws ecs wait tasks-stopped \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN"

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ Migration failed with exit code ${EXIT_CODE}"
            exit 1
          fi
          echo "✅ Migration completed successfully"

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Update ECS services with the new image
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── API service ─────────────────────────────────────────────────────
      - name: Render API task definition
        id: render-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-def-api.json
          container-name:  api
          image:           ${{ needs.build-and-push.outputs.image }}

      - name: Deploy API service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:        ${{ steps.render-api.outputs.task-definition }}
          service:                ${{ env.API_SERVICE }}
          cluster:                ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Worker service ───────────────────────────────────────────────────
      - name: Render Worker task definition
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-def-worker.json
          container-name:  worker
          image:           ${{ needs.build-and-push.outputs.image }}

      - name: Deploy Worker service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:        ${{ steps.render-worker.outputs.task-definition }}
          service:                ${{ env.WORKER_SERVICE }}
          cluster:                ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Smoke test via ALB
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
