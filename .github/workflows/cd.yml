name: CD — Build, Push & Deploy to ECS Fargate

on:
  push:
    branches: [main]

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  ECR_REPO:       ${{ secrets.ECR_REPOSITORY }}   # e.g. 453711491609.dkr.ecr.us-east-1.amazonaws.com/etl-agent-app
  ECS_CLUSTER:    ${{ secrets.ECS_CLUSTER }}       # etl-agent-cluster
  API_SERVICE:    ${{ secrets.ECS_API_SERVICE }}   # etl-agent-api
  WORKER_SERVICE: ${{ secrets.ECS_WORKER_SERVICE }} # etl-agent-worker
  # Image URI is deterministic: registry:sha — used by all downstream jobs directly
  IMAGE_URI:      ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Build and push Docker image to ECR
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        run: |
          if [ -z "${ECR_REPO}" ]; then
            echo "❌ ECR_REPO is empty — check that ECR_REPOSITORY is set in GitHub Secrets"
            exit 1
          fi

          echo "Building: ${IMAGE_URI}"

          docker build \
            --file infra/Dockerfile \
            --build-arg GIT_SHA="${GITHUB_SHA}" \
            --tag "${IMAGE_URI}" \
            --cache-from "${ECR_REPO}:latest" \
            .
          docker push "${IMAGE_URI}"

          # Tag latest for cache on the next build (non-fatal)
          docker tag "${IMAGE_URI}" "${ECR_REPO}:latest"
          docker push "${ECR_REPO}:latest" || echo "⚠️  Could not push :latest tag (non-fatal)"

          echo "✅ Pushed: ${IMAGE_URI}"

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Run DB migrations before deploying new code
  # ─────────────────────────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Render API task definition with built image
        id: render-migration-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-def-api.json
          container-name:  api
          image:           ${{ env.IMAGE_URI }}

      - name: Register rendered API task definition
        id: register-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.render-migration-task-def.outputs.task-definition }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "Registered task definition: ${TASK_DEF_ARN}"
          echo "task_def_arn=${TASK_DEF_ARN}" >> "$GITHUB_OUTPUT"

      - name: Run Alembic migrations via ECS run-task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --task-definition "${{ steps.register-task-def.outputs.task_def_arn }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_IDS }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP_ID }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["alembic","-c","src/etl_agent/database/migrations/alembic.ini","upgrade","head"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: ${TASK_ARN}"

          # Wait for the migration task to finish (max 5 min)
          aws ecs wait tasks-stopped \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN"

          # Retry loop — exit code can lag behind tasks-stopped by a few seconds
          EXIT_CODE="unknown"
          for i in {1..6}; do
            TASK_STATUS=$(aws ecs describe-tasks \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --tasks "$TASK_ARN")
            EXIT_CODE=$(echo "$TASK_STATUS" | jq -r '.tasks[0].containers[0].exitCode // "unknown"')
            [ "$EXIT_CODE" != "unknown" ] && break
            echo "Exit code not yet available, retrying ($i/6)..."
            sleep 5
          done

          LAST_STATUS=$(echo  "$TASK_STATUS" | jq -r '.tasks[0].lastStatus')
          STOP_CODE=$(echo    "$TASK_STATUS" | jq -r '.tasks[0].stopCode // "N/A"')
          STOP_REASON=$(echo  "$TASK_STATUS" | jq -r '.tasks[0].stoppedReason // "N/A"')
          echo "Task status: $LAST_STATUS | Exit code: $EXIT_CODE"
          echo "Stop code: $STOP_CODE"
          echo "Stop reason: $STOP_REASON"

          # Print CloudWatch logs for debugging regardless of outcome
          LOG_STREAM=$(echo "$TASK_STATUS" | jq -r '.tasks[0].containers[0].logStreamName // ""')
          if [ -n "$LOG_STREAM" ]; then
            echo "📋 Migration logs:"
            aws logs get-log-events \
              --log-group-name /ecs/etl-agent/api \
              --log-stream-name "$LOG_STREAM" \
              --query 'events[].message' --output text || true
          else
            echo "⚠️  No log stream found — task likely failed to start (stopCode: $STOP_CODE)"
          fi

          if [ "$EXIT_CODE" = "unknown" ] || [ "$EXIT_CODE" != "0" ]; then
            echo "❌ Migration failed — exit: ${EXIT_CODE}, reason: ${STOP_REASON}"
            exit 1
          fi
          echo "✅ Migration completed successfully"

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Update ECS services with the new image
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── API service ─────────────────────────────────────────────────────
      - name: Render API task definition
        id: render-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-def-api.json
          container-name:  api
          image:           ${{ env.IMAGE_URI }}

      - name: Deploy API service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.render-api.outputs.task-definition }}
          service:                    ${{ env.API_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Worker service ───────────────────────────────────────────────────
      - name: Render Worker task definition
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-def-worker.json
          container-name:  worker
          image:           ${{ env.IMAGE_URI }}

      - name: Ensure worker service has at least 1 desired task
        run: |
          CURRENT=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.WORKER_SERVICE }}" \
            --query 'services[0].desiredCount' --output text)
          if [ "${CURRENT}" = "0" ]; then
            aws ecs update-service \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --service "${{ env.WORKER_SERVICE }}" \
              --desired-count 1
            echo "Worker scaled from 0 → 1"
          fi

      - name: Deploy Worker service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.render-worker.outputs.task-definition }}
          service:                    ${{ env.WORKER_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Smoke test via ALB
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Health check via ALB
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "etl-agent-alb" \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          echo "ALB: http://${ALB_DNS}"
          sleep 15
          curl --fail --silent --max-time 10 \
            "http://${ALB_DNS}/api/v1/health" | jq .
          echo "✅ Smoke test passed"
