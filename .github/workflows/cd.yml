name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f infra/Dockerfile -t $ECR_REGISTRY/etl-agent-app:$IMAGE_TAG .
          docker push $ECR_REGISTRY/etl-agent-app:$IMAGE_TAG
          echo "IMAGE=$ECR_REGISTRY/etl-agent-app:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/etl-agent
            git pull origin main
            echo "${{ env.IMAGE }}" > .current_image
            docker pull ${{ env.IMAGE }}
            docker compose -f infra/docker-compose.yml up -d
            docker exec etl-agent-app-1 alembic -c src/etl_agent/database/migrations/alembic.ini upgrade head

      - name: Smoke test deployed endpoint
        run: |
          sleep 30
          curl -f http://${{ secrets.EC2_HOST }}:8000/api/v1/health || exit 1
          echo "✅ Deployment smoke test passed"
