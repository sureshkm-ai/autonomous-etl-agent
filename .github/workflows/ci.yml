name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dev dependencies
        run: uv sync
      - name: Run ruff linter
        run: uv run ruff check src/ tests/
      - name: Run ruff formatter check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Run mypy
        run: uv run mypy src/

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Run unit tests
        run: uv run pytest tests/unit/ -v -m unit --cov=src/etl_agent --cov-report=xml
        env:
          ANTHROPIC_API_KEY: "test-key"
          GITHUB_TOKEN: "test-token"
          GITHUB_TARGET_REPO: "test/repo"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_S3_RAW_BUCKET: "test-raw"
          AWS_S3_PROCESSED_BUCKET: "test-processed"
          AWS_S3_ARTIFACTS_BUCKET: "test-artifacts"
          AWS_ENDPOINT_URL: "http://localhost:4566"
          API_KEY: "test-api-key"
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Run integration tests
        run: uv run pytest tests/integration/ -v -m integration
        env:
          ANTHROPIC_API_KEY: "test-key"
          GITHUB_TOKEN: "test-token"
          GITHUB_TARGET_REPO: "test/repo"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_S3_RAW_BUCKET: "test-raw"
          AWS_S3_PROCESSED_BUCKET: "test-processed"
          AWS_S3_ARTIFACTS_BUCKET: "test-artifacts"
          AWS_ENDPOINT_URL: "http://localhost:4566"
          API_KEY: "test-api-key"
