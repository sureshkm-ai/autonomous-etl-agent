id: "story-005"
title: "Analyse revenue by geography for campaign targeting"
description: >
  As a data engineer, I want to aggregate customer spend by country and
  region to identify high-value geographic segments for the iPhone 17
  marketing campaign.
acceptance_criteria:
  - "Revenue must be aggregated by country and region"
  - "Output must include customer_count and avg_spend_per_customer"
  - "Regions with total_revenue > $10,000 must be flagged as high_value"
source:
  path: "s3://etl-agent-raw/amazon_orders.parquet"
  format: "parquet"
target:
  path: "s3://etl-agent-processed/geo_revenue"
  format: "delta"
  mode: "overwrite"
transformations:
  - operation: "join"
    join_table: "s3://etl-agent-raw/amazon_customers.parquet"
    join_key: "customer_id"
    join_type: "left"
  - operation: "aggregate"
    group_by: ["country", "region"]
    metrics: ["total_revenue", "customer_count", "avg_spend_per_customer"]
  - operation: "enrich"
    column: "is_high_value"
    value: "total_revenue > 10000"
output_format: "script"
tags: ["geo", "analytics", "marketing", "targeting", "iphone-17"]
